<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IPU Inventory</title>

<style>
/* ============================================================
   ICS LANDING — "Warm + Touches" (one-shot polish)
   - Keeps your identity (waves, warm white, teal/orange touches)
   - Stronger hierarchy, better spacing rhythm, smoother cards
   - Cleaner wave layering + readability
   - Mobile + keyboard focus upgrades
============================================================ */

:root{
  --bgTop: #ffffff;
  --bgBot: #f4f6f9;

  --ink: #444;
  --ink2: #555;
  --muted: #777;
  --muted2: #888;

  /* === ICS BRAND CORE === */
  --teal-rgb: 20,137,168;      /* #1489A8 */
  --orange-rgb: 243,112,33;    /* #F37021 */

  /* Controlled light versions (same hue, lighter via opacity) */
  --teal-soft: rgba(20,137,168,.12);
  --teal-glow: rgba(20,137,168,.18);
  --teal-strong: rgba(20,137,168,.85);

  --orange-soft: rgba(243,112,33,.12);
  --orange-glow: rgba(243,112,33,.18);

  /* Card system */
  --cardBg: rgba(255,255,255,0.94);
  --cardBorder: rgba(243,112,33,.35);
  --cardBorderHover: #1FA4C4;  /* lighter brand teal */
  
  --shadow: 0 10px 25px rgba(0,0,0,0.08);
  --shadowHover: 0 16px 34px rgba(0,0,0,0.10);

  --radius: 18px;
}

*{ box-sizing:border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
html, body { height: 100%; }

body{
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background:
    linear-gradient(to bottom,
      var(--bgTop) 0%,
      var(--bgTop) 290px,
      var(--bgBot) 290px,
      var(--bgBot) 100%);
}

/* ================= HEADER ================= */

header{
  text-align: center;
  padding: 70px 20px 30px;
  position: relative;
  overflow: hidden;
}

/* A subtle “glass” halo behind header text for readability */
.header-sheen{
  position:absolute;
  left: 50%;
  top: 42px;
  transform: translateX(-50%);
  width: min(760px, 92vw);
  height: 140px;
  background:
    radial-gradient(320px 110px at 50% 45%,
      rgba(255,255,255,0.92),
      rgba(255,255,255,0.55) 55%,
      rgba(255,255,255,0.0) 78%);
  pointer-events:none;
  z-index:1;
}

.header-title,
.header-sub,
.header-tagline{
  position: relative;
  z-index: 2;
}

.header-title{
  font-size: 26px;
  font-weight: 760;
  letter-spacing: 1px;
  color: var(--ink);
}

.header-sub{
  font-size: 13px;
  margin-top: 6px;
  letter-spacing: 1px;
  color: var(--muted);
  text-transform: uppercase;
}

.header-tagline{
  margin-top: 14px;
  font-size: 13px;
  color: var(--muted2);
  letter-spacing: .5px;
}

/* ===== Waves ===== */
.wave-layer{
  position: absolute;
  /* Your “waves through text” move — tuned to feel intentional */
  bottom: 70px;
  left: 0;
  width: 100%;
  height: 170px;
  pointer-events: none;
  z-index: 0;
}

.wave-layer svg{
  position: absolute;
  inset: 0;
  width: 120%;
  left: -10%;
  height: 100%;
  display: block;
  pointer-events: none;
  opacity: 0.42;
  filter: saturate(1.02);
}

.wave-top { transform: translateY(-10px); }
.wave-mid { transform: translateY(2px); }
.wave-low { transform: translateY(12px); }

/* ================= MAIN ================= */

main{
  max-width: 1020px;
  margin: 0 auto;
  text-align: center;
  padding: 18px 12px 56px;
}

h2{
  font-size: 26px;
  font-weight: 560;
  margin: 0;
  color: var(--ink2);
  letter-spacing: 1px;
}

.select-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap: 12px;
  margin-bottom: 10px;
}

/* Pull the subline slightly upward so it clears the white/gray seam */
.section-sub{
  font-size: 14px;
  color: var(--muted);
  margin-top: -6px;
  margin-bottom: 56px;
}

/* ================= CARDS ================= */

.ipu-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 270px));
  justify-content:center;
  gap: 46px;
  padding: 0 6px;
}

.ipu-card{
  background: var(--cardBg);
  border: 3px solid var(--cardBorder);
  border-radius: var(--radius);
  padding: 26px 18px 22px;
  text-decoration:none;
  color: inherit;
  box-shadow: var(--shadow);
  opacity: 0.95;
  transform: translateY(0);
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, opacity .18s ease;
  position: relative;
  outline: none;
}

/* Tiny corner accent (subtle, not loud) */
.ipu-card::before{
  content:"";
  position:absolute;
  inset: 10px;
  border-radius: calc(var(--radius) - 8px);
  pointer-events:none;
  background:
    radial-gradient(70px 70px at 18% 20%, rgba(var(--orange-rgb),.16), transparent 65%),
    radial-gradient(90px 90px at 78% 62%, rgba(var(--teal-rgb),.14), transparent 70%);
  opacity: .9;
}

.ipu-card:hover{
  transform: translateY(-4px);
  box-shadow: var(--shadowHover);
  border-color: var(--cardBorderHover);
  opacity: 1;
}

.ipu-card:focus-visible{
  box-shadow:
    0 0 0 4px rgba(var(--teal-rgb), .18),
    var(--shadowHover);
  border-color: rgba(var(--teal-rgb), .95);
}

.ipu-icon{
  width: 102px;
  height: 102px;
  margin: 0 auto 14px;
  border-radius: 26px;
  display:grid;
  place-items:center;
  background: #ffffff;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 10px 18px rgba(0,0,0,0.05);
  position: relative;
  z-index: 1; /* above ::before */
}

.ipu-icon img{
  width: 74px;
  height: 74px;
  object-fit: contain;
  display:block;
}

.ipu-title{
  font-size: 22px;
  font-weight: 560;
  margin-bottom: 10px;
  color: var(--ink2);
  position: relative;
  z-index: 1;
}

/* Small helper line (keeps it feeling like an app, not a poster) */
.ipu-meta{
  font-size: 12px;
  color: rgba(0,0,0,0.52);
  letter-spacing: .4px;
  position: relative;
  z-index: 1;
}

/* ================= BADGE ================= */

.brand-badge{
  width: 34px;
  height: 34px;
  border-radius: 12px;
  background:
    radial-gradient(16px 16px at 30% 30%, rgba(var(--orange-rgb),.45), transparent 62%),
    radial-gradient(18px 18px at 70% 60%, rgba(var(--teal-rgb),.38), transparent 64%),
    rgba(255,255,255,.72);
  border: 1px solid rgba(0,0,0,.06);
  box-shadow: 0 10px 18px rgba(0,0,0,.06);
  display:grid;
  place-items:center;
  flex: 0 0 auto;
}

.brand-badge svg{
  width: 18px;
  height: 18px;
}

/* ================= FOOTER ================= */

footer{
  text-align:center;
  padding: 10px 16px 28px;
  color: rgba(0,0,0,0.38);
  font-size: 12px;
  letter-spacing: .2px;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 520px){
  body{
    background:
      linear-gradient(to bottom,
        var(--bgTop) 0%,
        var(--bgTop) 310px,
        var(--bgBot) 310px,
        var(--bgBot) 100%);
  }
  header{ padding: 56px 16px 24px; }
  .header-title{ font-size: 20px; letter-spacing: .8px; }
  .wave-layer{ bottom: 78px; height: 150px; }
  .ipu-grid{ gap: 22px; }
  .section-sub{ margin-bottom: 36px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce){
  .ipu-card{ transition: none; }
  .ipu-card:hover{ transform:none; }
}
</style>
</head>

<body>
